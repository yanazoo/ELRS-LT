; ============================================================
; MERGE THIS into the existing platformio.ini in the repo root.
; Adds the gate_ep1 sniffer environment (EP1 TCXO = ESP8285).
; Do NOT remove existing [env:gate_node] / [env:web_node] envs.
; The aircraft_node envs can stay but are no longer flashed.
; ============================================================

[env:gate_ep1]
platform = espressif8266
board = esp8285
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_src_filter = +<gate_ep1/>
build_flags =
    -D GATE_EP1
    ; SX1280 SPI pins are fixed by the EP1 PCB; confirm from the
    ; ExpressLRS hardware target JSON for HappyModel EP1 before Step 2.
lib_deps =
    ; Add SX1280 driver dependency once selected in Step 2.
    ; Option A: vendor a trimmed SX1280 driver from the ELRS repo.
    ; Option B: a standalone SX1280 Arduino lib (validate 2.4GHz LoRa support).
